<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVG.Mercader</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; min-height: 100vh; color: #e2e8f0; overflow-x: hidden; }

  .video-bg { position: fixed; inset: 0; z-index: -2; }
  .video-bg img {
    width: 110%; height: 110%;
    object-fit: cover; object-position: center;
    animation: slow-pan 20s ease-in-out infinite alternate;
    filter: brightness(0.85) saturate(1.1);
  }
  @keyframes slow-pan {
    from { transform: translateX(0) translateY(0) scale(1.05); }
    to   { transform: translateX(-4%) translateY(-2%) scale(1.12); }
  }
  .overlay { position: fixed; inset: 0; z-index: -1; background: rgba(13,17,28,0.45); }

  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem; height: 58px;
    background: rgba(18,22,36,0.55);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-size: 1.3rem; font-weight: 700; color: #fff; }
  .nav-center { display: flex; gap: 0.25rem; }
  .nav-btn {
    background: none; border: none; color: #94a3b8;
    font-size: 0.875rem; font-family: 'Inter', sans-serif;
    padding: 0.4rem 0.85rem; border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; gap: 0.3rem; transition: all 0.2s;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.07); color: #fff; }
  .nav-right { display: flex; align-items: center; gap: 0.75rem; }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg,#6366f1,#8b5cf6);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 600; color: white;
  }
  .user-name { font-size: 0.875rem; color: #cbd5e1; }
  .bell-btn { background:none; border:none; color:#64748b; cursor:pointer; padding:0.3rem; border-radius:6px; }
  .bell-btn:hover { color:#fff; }

  main { max-width: 1300px; margin: 0 auto; padding: 2rem 1.5rem; }

  .search-row { display: flex; gap: 0.75rem; margin-bottom: 1.75rem; align-items: center; }
  .search-wrap { flex: 1; position: relative; }
  .search-wrap svg { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #64748b; width: 16px; height: 16px; }
  .search-input {
    width: 100%; padding: 0.7rem 1rem 0.7rem 2.6rem;
    background: rgba(30,36,56,0.6); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; color: #e2e8f0; font-size: 0.9rem; font-family: 'Inter',sans-serif;
    outline: none; backdrop-filter: blur(8px); transition: border-color 0.2s;
  }
  .search-input::placeholder { color: #475569; }
  .search-input:focus { border-color: rgba(99,102,241,0.5); }
  .filter-select {
    padding: 0.7rem 1rem;
    background: rgba(30,36,56,0.6); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; color: #cbd5e1; font-size: 0.875rem;
    font-family: 'Inter',sans-serif; cursor: pointer; outline: none;
    backdrop-filter: blur(8px); min-width: 130px;
  }
  .filter-select option { background: #1e2438; }

  .grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 0.85rem; }
  @media (max-width:1100px) { .grid { grid-template-columns: repeat(4,1fr); } }
  @media (max-width:860px)  { .grid { grid-template-columns: repeat(3,1fr); } }
  @media (max-width:580px)  { .grid { grid-template-columns: repeat(2,1fr); } }

  .card {
    background: rgba(22,28,48,0.92);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 1rem;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    contain: layout style;
    will-change: auto;
  }
  .card:hover {
    transform: translateY(-3px);
    border-color: rgba(255,255,255,0.2);
    box-shadow: 0 8px 28px rgba(0,0,0,0.45);
  }

  /* IMAGE BOX — square, fixed, dark inset */
  .card-img {
    width: 130px;
    height: 130px;
    background: rgba(10,14,28,0.55);
    border-radius: 8px;
    margin-bottom: 0.85rem;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }
  .card-img img {
    width: 85%;
    height: 85%;
    object-fit: contain;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
    transition: transform 0.25s;
  }
  .card:hover .card-img img { transform: scale(1.07); }

  .card-name { font-size: 0.92rem; font-weight: 700; margin-bottom: 0.25rem; }
  .card-value { font-size: 0.8rem; color: #94a3b8; margin-bottom: 0.7rem; }
  .card-value strong { color: #e2e8f0; font-weight: 600; }
  .card-stats { display: flex; flex-direction: column; gap: 0.18rem; font-size: 0.72rem; width: 100%; text-align: left; }
  .stat-row { display: flex; justify-content: space-between; }
  .stat-row span:first-child { font-weight: 700; color: #cbd5e1; }
  .stat-row span:last-child { color: #64748b; }

  .badge { font-weight: 600; }
  .badge.overpaid    { color: #f59e0b; }
  .badge.rising      { color: #22c55e; }
  .badge.fluctuating { color: #3b82f6; }
  .badge.stable      { color: #22c55e; }
  .badge.dropping    { color: #ef4444; }
  .badge.underpaid   { color: #ef4444; }
  .badge.unstable    { color: #f97316; }

  .name-legendary { color: #f59e0b; }
  .name-epic      { color: #ef4444; }
  .name-rare      { color: #eab308; }
  .name-gold      { color: #f59e0b; }
  .name-red       { color: #ef4444; }
  .name-purple    { color: #a855f7; }
  .name-blue      { color: #3b82f6; }

  .load-more { text-align: center; margin-top: 2rem; padding-bottom: 2rem; }
  .load-more button {
    padding: 0.7rem 2rem;
    background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3);
    border-radius: 8px; color: #a5b4fc; font-family: 'Inter',sans-serif;
    font-size: 0.875rem; cursor: pointer; transition: all 0.2s; backdrop-filter: blur(8px);
  }
  .load-more button:hover { background: rgba(99,102,241,0.25); border-color: rgba(99,102,241,0.5); color: #c7d2fe; }
</style>

    <script>
      // Toggle hamburger menu
      function toggleMenu() {
        const m = document.getElementById('hamburgerMenu');
        m.style.display = m.style.display === 'none' ? 'block' : 'none';
      }
      document.addEventListener('click', function(e) {
        const btn = document.getElementById('hamburgerBtn');
        if (btn && !btn.contains(e.target)) {
          document.getElementById('hamburgerMenu').style.display = 'none';
        }
      });

      function loginWithDiscord() {
        const CLIENT_ID = '1501765131749687316';
        const REDIRECT_URI = encodeURIComponent('https://evgmercader.github.io/booga/booga.html');
        const SCOPE = 'identify';
        window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=${SCOPE}`;
      }

      function applyUserUI(user) {
        const avatarURL = user.avatar
          ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=128`
          : `https://cdn.discordapp.com/embed/avatars/0.png`;
        document.getElementById('userAvatar').src = avatarURL;
        document.getElementById('userName').textContent = user.username;
        document.getElementById('userSection').style.display = 'flex';
        document.getElementById('loginBtn').style.display = 'none';
        document.getElementById('menuLoginRow').style.display = 'none';
      }

      function openProfile() {
        const user = JSON.parse(sessionStorage.getItem('discordUser') || 'null');

        if (!user) {
          // Show guest profile
          const overlay = document.createElement('div');
          overlay.id = 'profileOverlay';
          overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);';

                    <svg width="36" height="36" viewBox="0 0 24 24" fill="#64748b"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
                  </div>
                </div>
                <div style="font-size:1rem;font-weight:700;color:#64748b;margin-bottom:4px;">Invitado</div>

          return;
        }

        const avatarURL = user.avatar
          ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.${user.avatar.startsWith('a_') ? 'gif' : 'png'}?size=256`
          : `https://cdn.discordapp.com/embed/avatars/0.png`;

        const bannerURL = user.banner
          ? `https://cdn.discordapp.com/banners/${user.id}/${user.banner}.${user.banner.startsWith('a_') ? 'gif' : 'png'}?size=600`
          : null;

        const accentColor = user.accent_color ? '#' + user.accent_color.toString(16).padStart(6, '0') : '#5865F2';

        // Build profile overlay
        const overlay = document.createElement('div');
        overlay.id = 'profileOverlay';
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);';

            <!-- Banner -->

            <div style="background:#1e2130;padding:0 16px 20px;">
              <div style="position:relative;margin-top:-40px;margin-bottom:12px;display:inline-block;">
                <img src="${avatarURL}" style="width:80px;height:80px;border-radius:50%;border:4px solid #1e2130;object-fit:cover;display:block;">
                <div style="position:absolute;bottom:4px;right:4px;width:16px;height:16px;background:#23a55a;border-radius:50%;border:3px solid #1e2130;"></div>
              </div>

              <div style="font-size:0.8rem;color:#94a3b8;margin-bottom:14px;">@${user.username}</div>
              <div style="background:#111420;border-radius:10px;padding:12px 14px;">
                <div style="font-size:0.7rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;">Reputación</div>
                <div style="font-size:1rem;font-weight:600;color:#4ade80;">+1</div>
              </div>
            </div>
          </div>`;

        overlay.addEventListener('click', function(e) {
          if (e.target === overlay) overlay.remove();
        });

        document.body.appendChild(overlay);
      }

      // On page load
      (function() {
        // Check saved session
        const saved = sessionStorage.getItem('discordUser');
        if (saved) { applyUserUI(JSON.parse(saved)); }

        // Check if Discord returned token
        const hash = window.location.hash;
        if (hash.includes('access_token')) {
          const params = new URLSearchParams(hash.slice(1));
          const token = params.get('access_token');
          if (token) {
            sessionStorage.setItem('discordToken', token);
            fetch('https://discord.com/api/users/@me', {
              headers: { Authorization: 'Bearer ' + token }
            })
            .then(r => r.json())
            .then(user => {
              sessionStorage.setItem('discordUser', JSON.stringify(user));
              applyUserUI(user);
              history.replaceState(null, '', window.location.pathname);
            });
          }
        }
      })();
    </script>

const stabilityClass = { Overpaid:"overpaid", Rising:"rising", Fluctuating:"fluctuating", Stable:"stable", Dropping:"dropping", Underpaid:"underpaid", Unstable:"unstable" };
const rarityClass = { legendary:"name-legendary", epic:"name-epic", rare:"name-rare", gold:"name-gold", red:"name-red", purple:"name-purple", blue:"name-blue" };
const stabilityColor = { Overpaid:"#f59e0b", Rising:"#22c55e", Fluctuating:"#3b82f6", Stable:"#22c55e", Dropping:"#ef4444", Underpaid:"#ef4444", Unstable:"#f97316" };
let shown = 20;
let currentList = items;

const lazyObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const img = entry.target;
      if (img.dataset.src) {
        img.src = img.dataset.src;
        img.removeAttribute('data-src');
      }
      lazyObserver.unobserve(img);
    }
  });
}, { rootMargin: '300px' });

function renderItems(list) {
  currentList = list;
  shown = 20;
  const grid = document.getElementById("itemGrid");
  grid.innerHTML = "";
  appendItems(list, 0, shown);
}

function appendItems(list, from, to) {
  const grid = document.getElementById("itemGrid");
  const frag = document.createDocumentFragment();
  list.slice(from, to).forEach(item => {
    const card = document.createElement("div");
    card.className = "card";
    const imgSrc = itemImages[item.key] || '';
    card.innerHTML = `
      <div class="card-img"><img ${imgSrc ? `data-src="${imgSrc}"` : ''} alt="${item.name}" style="min-height:80px;"></div>
      <div class="card-name ${rarityClass[item.rarity]}">${item.name}</div>
      <div class="card-value">Value: <strong>${item.value}</strong></div>
      <div class="card-stats">
        <div class="stat-row"><span>Demand:</span><span>${item.demand}</span></div>
        <div class="stat-row"><span>Supply:</span><span>${item.supply}</span></div>
        <div class="stat-row"><span>Stability:</span><span class="badge ${stabilityClass[item.stability]}"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${stabilityColor[item.stability]};margin-right:5px;vertical-align:middle;"></span>${item.stability}</span></div>
      </div>
    `;
    frag.appendChild(card);
    const img = card.querySelector('img[data-src]');
    if (img) lazyObserver.observe(img);
  });
  grid.appendChild(frag);
}

// Infinite scroll sentinel
const sentinel = document.createElement('div');
sentinel.id = 'sentinel';
sentinel.style.height = '10px';
document.getElementById("itemGrid").after(sentinel);

const scrollObserver = new IntersectionObserver((entries) => {
  if (entries[0].isIntersecting && shown < currentList.length) {
    const next = Math.min(shown + 20, currentList.length);
    appendItems(currentList, shown, next);
    shown = next;
  }
}, { rootMargin: '200px' });
scrollObserver.observe(sentinel);

document.querySelector(".search-input").addEventListener("input", function() {
  renderItems(items.filter(i => i.name.toLowerCase().includes(this.value.toLowerCase())));
});

renderItems(items);
</script>
