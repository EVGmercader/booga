<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVG.Mercader</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; min-height: 100vh; color: #e2e8f0; overflow-x: hidden; }

  .video-bg { position: fixed; inset: 0; z-index: -2; }
  .video-bg img {
    width: 110%; height: 110%;
    object-fit: cover; object-position: center;
    animation: slow-pan 20s ease-in-out infinite alternate;
    filter: brightness(0.85) saturate(1.1);
  }
  @keyframes slow-pan {
    from { transform: translateX(0) translateY(0) scale(1.05); }
    to   { transform: translateX(-4%) translateY(-2%) scale(1.12); }
  }
  .overlay { position: fixed; inset: 0; z-index: -1; background: rgba(13,17,28,0.45); }

  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem; height: 58px;
    background: rgba(18,22,36,0.55);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    position: sticky; top: 0; z-index: 100;
  }
  .nav-center { display: flex; gap: 0.25rem; }
  .nav-btn {
    background: none; border: none; color: #94a3b8;
    font-size: 0.875rem; font-family: 'Inter', sans-serif;
    padding: 0.4rem 0.85rem; border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; gap: 0.3rem; transition: all 0.2s;
    text-decoration: none;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.07); color: #fff; }
  .nav-right { display: flex; align-items: center; gap: 0.75rem; }
  .user-name { font-size: 0.875rem; color: #cbd5e1; }

  .profile-wrap {
    max-width: 700px;
    margin: 3rem auto;
    padding: 0 1rem;
  }

  .profile-card {
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    background: #1e2130;
  }

  .banner {
    height: 160px;
    background: #5865F2;
    position: relative;
    overflow: hidden;
  }
  .banner img {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .profile-body {
    padding: 0 24px 28px;
  }

  .avatar-wrap {
    position: relative;
    margin-top: -52px;
    margin-bottom: 14px;
    display: inline-block;
  }
  .avatar-wrap img {
    width: 100px; height: 100px;
    border-radius: 50%;
    border: 5px solid #1e2130;
    object-fit: cover;
    display: block;
  }
  .status-dot {
    position: absolute;
    bottom: 6px; right: 6px;
    width: 20px; height: 20px;
    background: #23a55a;
    border-radius: 50%;
    border: 4px solid #1e2130;
  }

  .profile-name { font-size: 1.4rem; font-weight: 700; color: #fff; }
  .profile-tag { font-size: 0.875rem; color: #64748b; margin-bottom: 18px; }

  .profile-section {
    background: #111420;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 12px;
  }
  .section-label {
    font-size: 0.7rem;
    font-weight: 700;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }
  .section-value {
    font-size: 1rem;
    font-weight: 600;
    color: #e2e8f0;
  }
  .rep-positive { color: #4ade80; }

  .guest-box {
    text-align: center;
    padding: 3rem 2rem;
  }
  .guest-icon {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: #2d3148;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1rem;
  }
  .guest-name { font-size: 1.2rem; font-weight: 700; color: #64748b; margin-bottom: 6px; }
  .guest-sub { font-size: 0.85rem; color: #475569; margin-bottom: 1.5rem; }
  .login-btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: #5865F2; border: none; color: #fff;
    font-size: 0.9rem; font-family: 'Inter', sans-serif; font-weight: 600;
    padding: 0.6rem 1.4rem; border-radius: 8px; cursor: pointer;
    transition: background 0.2s;
  }
  .login-btn:hover { background: #4752c4; }

  .back-btn {
    display: inline-flex; align-items: center; gap: 0.4rem;
    color: #94a3b8; font-size: 0.85rem; margin-bottom: 1.2rem;
    background: none; border: none; cursor: pointer; font-family: 'Inter', sans-serif;
    transition: color 0.2s;
  }
  .back-btn:hover { color: #fff; }
</style>

<script>
  function loginWithDiscord() {
    const CLIENT_ID = '1501765131749687316';
    const REDIRECT_URI = encodeURIComponent('https://evgmercader.github.io/booga/profile.html');
    const SCOPE = 'identify';
    window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=${SCOPE}`;
  }

  function renderProfile(user) {
    const avatarURL = user.avatar
      ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.${user.avatar.startsWith('a_') ? 'gif' : 'png'}?size=256`
      : `https://cdn.discordapp.com/embed/avatars/0.png`;

    const bannerURL = user.banner
      ? `https://cdn.discordapp.com/banners/${user.id}/${user.banner}.${user.banner.startsWith('a_') ? 'gif' : 'png'}?size=600`
      : null;

    const accentColor = user.accent_color ? '#' + user.accent_color.toString(16).padStart(6, '0') : '#5865F2';
    const colors = JSON.parse(localStorage.getItem('booga_colors') || '{}');
    const savedColor = colors[user.id];

    document.getElementById('profileCard').innerHTML = `
      <div class="banner" style="${bannerURL ? `background:url('${bannerURL}') center/cover no-repeat` : `background:${savedColor || accentColor}`}">
        ${bannerURL ? `<img src="${bannerURL}" alt="banner">` : ''}
      </div>
      <div class="profile-body">
        <div class="avatar-wrap">
          <img src="${avatarURL}" alt="avatar">
          <div class="status-dot"></div>
        </div>
        <div class="profile-name">${user.global_name || user.username}</div>
        <div class="profile-tag">@${user.username}</div>
        <div class="profile-section">
          <div class="section-label">Descripción</div>
          <div id="descDisplay" style="font-size:0.9rem;color:#cbd5e1;min-height:20px;">${getDesc(user.id)}</div>
          <button onclick="editDesc('${user.id}')" style="margin-top:8px;background:rgba(255,255,255,0.07);border:none;color:#94a3b8;font-size:0.75rem;font-family:Inter,sans-serif;padding:4px 10px;border-radius:6px;cursor:pointer;">✏️ Editar</button>
        </div>

      </div>`;

    // Build color picker
    const colors_preset = ['#5865F2','#eb459e','#57F287','#FEE75C','#ED4245','#ff7b25','#a855f7','#0ea5e9','#111827','#1e293b'];
    const picker = document.getElementById('colorPicker');
    if (picker) {
      colors_preset.forEach(c => {
        const d = document.createElement('div');
        d.style.cssText = `width:28px;height:28px;border-radius:6px;background:${c};cursor:pointer;border:2px solid rgba(255,255,255,0.1);transition:transform 0.15s;`;
        d.onmouseover = () => d.style.transform = 'scale(1.2)';
        d.onmouseout = () => d.style.transform = 'scale(1)';
        d.onclick = () => setBannerColor(user.id, c);
        picker.appendChild(d);
      });
      // Custom color input
      const label = document.createElement('label');
      label.style.cssText = 'width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,0.07);cursor:pointer;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,0.1);';
      label.title = 'Color personalizado';
      label.innerHTML = '<span style="font-size:14px;">🎨</span>';
      const inp = document.createElement('input');
      inp.type = 'color';
      inp.style.cssText = 'opacity:0;width:0;height:0;position:absolute;';
      inp.onchange = () => setBannerColor(user.id, inp.value);
      label.appendChild(inp);
      picker.appendChild(label);
    }

    // Update nav
    document.getElementById('userAvatar').src = avatarURL;
    document.getElementById('userName').textContent = user.username;
    document.getElementById('userSection').style.display = 'flex';
    document.getElementById('loginBtn').style.display = 'none';
  }

  function renderGuest() {
    document.getElementById('profileCard').innerHTML = `
      <div class="guest-box">
        <div class="guest-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="#64748b"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
        </div>
        <div class="guest-name">Invitado</div>
        <div class="guest-sub">Inicia sesión para ver tu perfil de Discord</div>
        <button class="login-btn" onclick="loginWithDiscord()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
          Iniciar sesión con Discord
        </button>
      </div>`;
  }

  // --- Reputation system ---
  function getRep(userId) {
    const reps = JSON.parse(localStorage.getItem('booga_reps') || '{}');
    return reps[userId] || 0;
  }
  function giveRep(userId, username) {
    const myUser = JSON.parse(sessionStorage.getItem('discordUser') || 'null');
    if (!myUser) { alert('Debes iniciar sesión para dar reputación.'); return; }
    if (myUser.id === userId) { alert('No puedes darte reputación a ti mismo.'); return; }
    const givenKey = 'booga_rep_given_' + myUser.id;
    const given = JSON.parse(localStorage.getItem(givenKey) || '[]');
    if (given.includes(userId)) { alert('Ya le diste reputación a este usuario.'); return; }
    const reps = JSON.parse(localStorage.getItem('booga_reps') || '{}');
    reps[userId] = (reps[userId] || 0) + 1;
    localStorage.setItem('booga_reps', JSON.stringify(reps));
    given.push(userId);
    localStorage.setItem(givenKey, JSON.stringify(given));
    document.getElementById('repDisplay').textContent = '+' + reps[userId];
    alert('✅ Le diste +1 reputación a @' + username);
  }

  // --- Description system ---
  function getDesc(userId) {
    const descs = JSON.parse(localStorage.getItem('booga_descs') || '{}');
    return descs[userId] || 'Sin descripción';
  }
  function editDesc(userId) {
    const myUser = JSON.parse(sessionStorage.getItem('discordUser') || 'null');
    if (!myUser || myUser.id !== userId) { alert('Solo puedes editar tu propia descripción.'); return; }
    const current = getDesc(userId);
    const newDesc = prompt('Escribe tu descripción:', current);
    if (newDesc === null) return;
    const descs = JSON.parse(localStorage.getItem('booga_descs') || '{}');
    descs[userId] = newDesc.slice(0, 200);
    localStorage.setItem('booga_descs', JSON.stringify(descs));
    document.getElementById('descDisplay').textContent = descs[userId];
  }

  // --- Banner color customization ---
  function setBannerColor(userId, color) {
    const myUser = JSON.parse(sessionStorage.getItem('discordUser') || 'null');
    if (!myUser || myUser.id !== userId) { alert('Solo puedes personalizar tu propio perfil.'); return; }
    const colors = JSON.parse(localStorage.getItem('booga_colors') || '{}');
    colors[userId] = color;
    localStorage.setItem('booga_colors', JSON.stringify(colors));
    document.querySelector('.banner').style.background = color;
  }

  // Check saved session first
  const saved = sessionStorage.getItem('discordUser');
  if (saved) {
    renderProfile(JSON.parse(saved));
  }

  // Check if Discord returned token in hash
  const hash = window.location.hash;
  if (hash.includes('access_token')) {
    const params = new URLSearchParams(hash.slice(1));
    const token = params.get('access_token');
    if (token) {
      sessionStorage.setItem('discordToken', token);
      fetch('https://discord.com/api/users/@me', {
        headers: { Authorization: 'Bearer ' + token }
      })
      .then(r => r.json())
      .then(user => {
        sessionStorage.setItem('discordUser', JSON.stringify(user));
        renderProfile(user);
        history.replaceState(null, '', window.location.pathname);
      });
    }
  } else if (!saved) {
    renderGuest();
  }
</script>
</body>
</html>
