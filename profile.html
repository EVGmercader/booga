<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil — EVG.Mercader</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    background: #1a1a2e;
  }

  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-color: #1e3a5f;
  }
  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(10, 15, 30, 0.45);
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 50;
    background: rgba(20, 22, 35, 0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    height: 52px;
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 24px;
  }
  nav a { color: #ccc; text-decoration: none; font-size: 0.88rem; transition: color 0.2s; }
  nav a:hover { color: #fff; }
  .nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .nav-avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; display: none; }
  .nav-username { font-size: 0.85rem; color: #ccc; display: none; }
  .btn-login-nav {
    background: #5865F2; color: #fff; border: none;
    padding: 7px 16px; border-radius: 6px; font-size: 0.82rem;
    font-weight: 500; cursor: pointer; display: flex; align-items: center;
    gap: 7px; transition: background 0.2s;
  }
  .btn-login-nav:hover { background: #4752c4; }
  .hamburger { background: none; border: none; color: #ccc; font-size: 1.2rem; cursor: pointer; }

  .page {
    position: relative; z-index: 10;
    padding: 80px 20px 60px;
    display: flex; flex-direction: column; align-items: center;
  }

  .back-link {
    align-self: flex-start;
    margin-left: max(0px, calc(50% - 330px));
    color: #aaa; font-size: 0.85rem; text-decoration: none;
    margin-bottom: 20px; display: flex; align-items: center; gap: 6px;
    transition: color 0.2s;
  }
  .back-link:hover { color: #fff; }

  .card {
    width: 100%; max-width: 660px;
    background: rgba(28, 30, 48, 0.92);
    border-radius: 14px; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.06);
  }

  .banner {
    width: 100%; height: 180px;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    position: relative; overflow: hidden;
  }
  .banner-img { width: 100%; height: 100%; object-fit: cover; display: none; }

  .avatar-section { padding: 0 24px 16px; position: relative; }
  .avatar-wrap { position: relative; display: inline-block; margin-top: -44px; }
  .avatar-img {
    width: 88px; height: 88px; border-radius: 50%;
    border: 4px solid rgba(28, 30, 48, 0.95);
    object-fit: cover; background: #2e3148; display: block;
  }
  .status-dot {
    position: absolute; bottom: 6px; right: 6px;
    width: 16px; height: 16px; border-radius: 50%;
    border: 3px solid rgba(28, 30, 48, 0.95);
    background: #747f8d;
  }
  .status-dot.online { background: #3ba55d; }
  .status-dot.idle   { background: #faa61a; }
  .status-dot.dnd    { background: #ed4245; }

  .user-info { margin-top: 12px; }
  .display-name { font-size: 1.3rem; font-weight: 600; color: #fff; }
  .username-tag { font-size: 0.85rem; color: #72767d; margin-top: 2px; }

  /* Guest */
  .guest-card {
    padding: 48px 24px;
    display: flex; flex-direction: column; align-items: center;
    gap: 16px; text-align: center;
  }
  .guest-icon {
    width: 72px; height: 72px; border-radius: 50%;
    background: #2e3148; display: flex; align-items: center;
    justify-content: center; color: #555; font-size: 2rem;
  }
  .guest-title { font-size: 1.2rem; font-weight: 600; color: #fff; }
  .guest-sub { font-size: 0.85rem; color: #72767d; }
  .btn-discord {
    background: #5865F2; color: #fff; border: none;
    padding: 12px 28px; border-radius: 8px; font-size: 0.9rem;
    font-weight: 500; cursor: pointer; display: flex; align-items: center;
    gap: 10px; transition: background 0.2s, transform 0.15s; margin-top: 8px;
  }
  .btn-discord:hover { background: #4752c4; transform: translateY(-1px); }
  .btn-discord svg { width: 20px; height: 20px; fill: #fff; }

  /* Description */
  .desc-box {
    margin: 0 24px 12px;
    background: rgba(0,0,0,0.25); border-radius: 8px;
    padding: 16px; border: 1px solid rgba(255,255,255,0.05);
  }
  .desc-label {
    font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: #72767d; margin-bottom: 8px;
  }
  .desc-text { font-size: 0.88rem; color: #dcddde; line-height: 1.5; }
  .desc-edit {
    margin-top: 10px; background: rgba(255,255,255,0.06); border: none;
    color: #aaa; padding: 6px 12px; border-radius: 5px; font-size: 0.78rem;
    cursor: pointer; transition: background 0.2s; display: flex; align-items: center; gap: 5px;
  }
  .desc-edit:hover { background: rgba(255,255,255,0.12); color: #fff; }

  /* Activity */
  .activity-box {
    margin: 0 24px 16px;
    background: rgba(0,0,0,0.25); border-radius: 8px;
    padding: 16px; border: 1px solid rgba(255,255,255,0.05);
    display: none;
  }
  .activity-label {
    font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: #72767d; margin-bottom: 12px;
  }
  .activity-inner { display: flex; gap: 14px; align-items: center; }
  .activity-gif {
    width: 72px; height: 72px; border-radius: 8px;
    object-fit: cover; background: #1e2030; flex-shrink: 0;
  }
  .activity-gif-placeholder {
    width: 72px; height: 72px; border-radius: 8px;
    background: #1e2030; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 1.8rem;
  }
  .activity-details { flex: 1; min-width: 0; }
  .activity-name { font-size: 0.85rem; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .activity-state { font-size: 0.78rem; color: #b9bbbe; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .activity-time { font-size: 0.72rem; color: #72767d; margin-top: 3px; }
  .no-activity { font-size: 0.82rem; color: #555; font-style: italic; }

  /* Spotify */
  .spotify-box {
    margin: 0 24px 24px;
    background: rgba(30, 215, 96, 0.07);
    border: 1px solid rgba(30, 215, 96, 0.15);
    border-radius: 8px; padding: 14px 16px;
    display: none; align-items: center; gap: 14px;
  }
  .spotify-art { width: 52px; height: 52px; border-radius: 4px; object-fit: cover; flex-shrink: 0; }
  .spotify-info { flex: 1; min-width: 0; }
  .spotify-label {
    font-size: 0.65rem; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: #1ed760; margin-bottom: 4px;
    display: flex; align-items: center; gap: 5px;
  }
  .spotify-song { font-size: 0.85rem; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .spotify-artist { font-size: 0.75rem; color: #b9bbbe; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2e3148; border-radius: 3px; }
</style>
</head>
<body>

<div class="bg"></div>

<nav>
  <a href="booga.html">Home</a>
  <a href="#">Marketplace</a>
  <div class="nav-right">
    <img class="nav-avatar" id="navAvatar" src="" alt="">
    <span class="nav-username" id="navUsername"></span>
    <button class="btn-login-nav" id="btnLoginNav" onclick="loginDiscord()">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="white"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
      Iniciar sesión
    </button>
    <button class="hamburger">☰</button>
  </div>
</nav>

<div class="page">
  <a href="booga.html" class="back-link">← Volver</a>

  <div class="card" id="mainCard">

    <!-- GUEST -->
    <div class="guest-card" id="guestState">
      <div class="guest-icon">👤</div>
      <div class="guest-title">Invitado</div>
      <div class="guest-sub">Inicia sesión para ver tu perfil de Discord</div>
      <button class="btn-discord" onclick="loginDiscord()">
        <svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
        Iniciar sesión con Discord
      </button>
    </div>

    <!-- LOGGED IN -->
    <div id="loggedState" style="display:none;">
      <div class="banner">
        <img class="banner-img" id="bannerImg" src="" alt="">
      </div>
      <div class="avatar-section">
        <div class="avatar-wrap">
          <img class="avatar-img" id="avatarImg" src="" alt="Avatar">
          <div class="status-dot" id="statusDot"></div>
        </div>
        <div class="user-info">
          <div class="display-name" id="displayName">—</div>
          <div class="username-tag" id="usernameTag">@—</div>
        </div>
      </div>

      <div class="desc-box">
        <div class="desc-label">Descripción</div>
        <div class="desc-text" id="descText">Dev MercaderEVL</div>
        <button class="desc-edit" onclick="editDesc()">✏️ Editar</button>
      </div>

      <div class="activity-box" id="activityBox">
        <div class="activity-label">Actividad actual</div>
        <div class="activity-inner" id="activityInner">
          <div class="no-activity">Sin actividad en este momento</div>
        </div>
      </div>

      <div class="spotify-box" id="spotifyBox">
        <img class="spotify-art" id="spotifyArt" src="" alt="">
        <div class="spotify-info">
          <div class="spotify-label">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="#1ed760"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
            Escuchando Spotify
          </div>
          <div class="spotify-song" id="spotifySong">—</div>
          <div class="spotify-artist" id="spotifyArtist">—</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  const CLIENT_ID = '1501765131749687316';
  const REDIRECT_URI = 'https://evgmercader.github.io/booga/profile.html';

  function loginDiscord() {
    const state = Math.random().toString(36).slice(2);
    sessionStorage.setItem('oauth_state', state);
    const url = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify&state=${state}`;
    window.location.href = url;
  }

  function getTokenFromHash() {
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    return params.get('access_token');
  }

  async function fetchDiscordUser(token) {
    const res = await fetch('https://discord.com/api/users/@me', {
      headers: { Authorization: `Bearer ${token}` }
    });
    return res.json();
  }

  function getAvatarUrl(user) {
    if (!user.avatar) return `https://cdn.discordapp.com/embed/avatars/${parseInt(user.discriminator || 0) % 5}.png`;
    const ext = user.avatar.startsWith('a_') ? 'gif' : 'png';
    return `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.${ext}?size=256`;
  }

  function getBannerUrl(user) {
    if (!user.banner) return null;
    const ext = user.banner.startsWith('a_') ? 'gif' : 'png';
    return `https://cdn.discordapp.com/banners/${user.id}/${user.banner}.${ext}?size=600`;
  }

  async function fetchLanyard(userId) {
    try {
      const res = await fetch(`https://api.lanyard.rest/v1/users/${userId}`);
      const data = await res.json();
      return data.success ? data.data : null;
    } catch { return null; }
  }

  function renderActivity(lanyardData) {
    if (!lanyardData) return;

    // Status dot
    const dot = document.getElementById('statusDot');
    const s = lanyardData.discord_status;
    dot.className = 'status-dot' + (s === 'online' ? ' online' : s === 'idle' ? ' idle' : s === 'dnd' ? ' dnd' : '');

    // Spotify
    const spotifyBox = document.getElementById('spotifyBox');
    if (lanyardData.spotify) {
      const sp = lanyardData.spotify;
      document.getElementById('spotifyArt').src = sp.album_art_url;
      document.getElementById('spotifySong').textContent = sp.song;
      document.getElementById('spotifyArtist').textContent = sp.artist.replace(/;/g, ',');
      spotifyBox.style.display = 'flex';
    } else {
      spotifyBox.style.display = 'none';
    }

    // Activity (juego / GIF)
    const box = document.getElementById('activityBox');
    const inner = document.getElementById('activityInner');
    const activities = (lanyardData.activities || []).filter(a => a.type === 0);
    const act = activities[0];

    box.style.display = 'block';

    if (act) {
      let imgSrc = '';
      if (act.assets && act.assets.large_image) {
        const li = act.assets.large_image;
        if (li.startsWith('mp:external/')) {
          imgSrc = 'https://media.discordapp.net/external/' + li.replace('mp:external/', '');
        } else if (!li.startsWith('spotify:')) {
          imgSrc = `https://cdn.discordapp.com/app-assets/${act.application_id}/${li}.png`;
        }
      }

      const imgHtml = imgSrc
        ? `<img class="activity-gif" src="${imgSrc}" alt="" onerror="this.outerHTML='<div class=activity-gif-placeholder>🎮</div>'">`
        : `<div class="activity-gif-placeholder">🎮</div>`;

      inner.innerHTML = `
        ${imgHtml}
        <div class="activity-details">
          <div class="activity-name">${act.name || '—'}</div>
          <div class="activity-state">${act.details || ''}</div>
          <div class="activity-time">${act.state || ''}</div>
        </div>`;
    } else {
      inner.innerHTML = `<div class="no-activity">Sin actividad en este momento</div>`;
    }
  }

  async function showProfile(token) {
    const user = await fetchDiscordUser(token);
    if (!user.id) { sessionStorage.removeItem('discord_token'); return; }

    sessionStorage.setItem('discord_token', token);

    document.getElementById('guestState').style.display = 'none';
    document.getElementById('loggedState').style.display = 'block';

    const name = user.global_name || user.username;
    document.getElementById('displayName').textContent = name;
    document.getElementById('usernameTag').textContent = '@' + user.username;

    const avatarUrl = getAvatarUrl(user);
    document.getElementById('avatarImg').src = avatarUrl;

    const bannerUrl = getBannerUrl(user);
    if (bannerUrl) {
      const b = document.getElementById('bannerImg');
      b.src = bannerUrl; b.style.display = 'block';
    }

    // Navbar
    document.getElementById('navAvatar').src = avatarUrl;
    document.getElementById('navAvatar').style.display = 'block';
    document.getElementById('navUsername').textContent = name;
    document.getElementById('navUsername').style.display = 'block';
    document.getElementById('btnLoginNav').style.display = 'none';

    // Descripción guardada
    const savedDesc = localStorage.getItem('desc_' + user.id);
    if (savedDesc) document.getElementById('descText').textContent = savedDesc;

    // Lanyard
    const ld = await fetchLanyard(user.id);
    renderActivity(ld);
    setInterval(async () => renderActivity(await fetchLanyard(user.id)), 15000);

    history.replaceState(null, '', window.location.pathname);
  }

  function editDesc() {
    const el = document.getElementById('descText');
    const input = prompt('Editar descripción:', el.textContent);
    if (input !== null && input.trim() !== '') {
      el.textContent = input.trim();
    }
  }

  (async function init() {
    const hashToken = getTokenFromHash();
    if (hashToken) { await showProfile(hashToken); return; }
    const saved = sessionStorage.getItem('discord_token');
    if (saved) { await showProfile(saved); return; }
  })();
</script>

</body>
</html>
